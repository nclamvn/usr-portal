<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Newsroom + Phân tích — bản dựng giao diện (specimen)</title>
<script>document.documentElement.classList.add('js')</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=Be+Vietnam+Pro:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ============ TOKENS — kế thừa nguyên văn portal-in-action (design-system-of-record) ============ */
:root{
  --bg:#F3F2EF; --panel:#FFFFFF;
  --ink:#1A1A1C; --ink-soft:#42434A; --muted:#6A6B72; --faint:#9A9BA1;
  --hair:#E2E0DB; --hair-strong:#D2CFC8;
  --brass:#9B6B1C; --brass-bright:#B5832B;
  --card:#15171B; --card-ink:#ECEAE4; --card-soft:#A9ABB0; --card-faint:#6E7177; --card-hair:#2A2D33;
  --bp:#D8A24A; --bp-soft:#C9C7C0; --bp-faint:#3A3D44;
  --wm:rgba(26,26,28,.045);
  --serif:'Source Serif 4',Georgia,serif;
  --sans:'Be Vietnam Pro',system-ui,sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --maxw:1200px;
}
[data-theme="dark"]{
  --bg:#0E1013; --panel:#15181C;
  --ink:#ECEDEF; --ink-soft:#C4C6CB; --muted:#9096A0; --faint:#6A707A;
  --hair:#23272E; --hair-strong:#2E333B;
  --brass:#D2A24C; --brass-bright:#DEB05C;
  --card:#181B20; --card-ink:#ECEDEF; --card-soft:#A9ADB4; --card-faint:#717682; --card-hair:#2C313A;
  --bp:#DEB05C; --bp-soft:#9AA0AA; --bp-faint:#3A4049;
  --wm:rgba(255,255,255,.035);
}
/* NOTE (handover record): this specimen is self-contained. The pipeline stylesheet is
   base/newsroom.css (loaded with design-system.css, whose aliases map these token names).
   Builders build_news.py / build_analysis.py are the canonical markup; this file is the
   design-language reference only. */
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.62}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 32px}
a{color:inherit;text-decoration:none}
</style>
</head>
<body>
<!-- Design-language specimen for the Newsroom + Analysis pillar.
     Full styled source was handed over by the architect; the live, gated implementation is
     generated by build_news.py + build_analysis.py using base/newsroom.css.
     Parts: A — Newsroom front (home news section); B — long-form Analysis (/analysis/[slug]).
     Signatures: hierarchical front (not a feed), entity-chips on every card, the four-questions
     "intelligence summary" box, data-first figures, Knowledge auto-links, tier A/B/C source
     apparatus, editorial style guide ('…' not "…", no !, dates DD/M, units spaced). -->
<main class="wrap" style="padding:60px 32px">
  <p style="font-family:var(--mono);font-size:12px;color:var(--brass);letter-spacing:.1em;text-transform:uppercase">Newsroom specimen · design-language record</p>
  <p style="margin-top:12px;color:var(--ink-soft)">Bản dựng giao diện gốc (Part A — Newsroom front; Part B — long-form Analysis) do kiến-trúc-sư bàn giao. Triển-khai sống nằm ở <code>build_news.py</code> + <code>build_analysis.py</code> trên <code>base/newsroom.css</code>.</p>
</main>
</body>
</html>
