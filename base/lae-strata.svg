<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" width="760" height="380" role="img" aria-label="Ba tầng ba mẫu số của kinh tế tầm thấp, không cộng chung">
  <rect width="760" height="380" fill="#F4F2ED"/>
  <rect x="0" y="0" width="760" height="380" fill="none" stroke="#CDC9C0" stroke-width="1"/>
  <text x="40" y="46" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="600" fill="#1A1A1C">Ba tầng, ba mẫu số — không cộng chung</text>
  <text x="40" y="70" font-family="ui-monospace, monospace" font-size="11" letter-spacing="1.5" fill="#6C6D74">KINH TẾ TẦM THẤP · MỖI SỐ ĐO TRÊN MỘT PHẠM VI KHÁC NHAU</text>
  <line x1="40" y1="86" x2="720" y2="86" stroke="#9B6B1C" stroke-width="1.5"/>

  <!-- VN -->
  <text x="40" y="128" font-family="ui-monospace, monospace" font-size="11" letter-spacing="1.2" fill="#9B6B1C">VIỆT NAM</text>
  <text x="40" y="172" font-family="Georgia, serif" font-size="40" font-weight="600" fill="#1A1A1C">≈6.000</text>
  <text x="40" y="196" font-family="ui-monospace, monospace" font-size="12" fill="#44454B">chuyến bay UAV</text>
  <text x="40" y="214" font-family="ui-monospace, monospace" font-size="11" fill="#6C6D74">mục-tiêu thí-điểm (Điện Biên)</text>

  <text x="270" y="172" font-family="Georgia, serif" font-size="34" fill="#9B6B1C">≠</text>

  <!-- China -->
  <text x="320" y="128" font-family="ui-monospace, monospace" font-size="11" letter-spacing="1.2" fill="#9B6B1C">TRUNG QUỐC</text>
  <text x="320" y="172" font-family="Georgia, serif" font-size="40" font-weight="600" fill="#1A1A1C">1–1,5</text>
  <text x="320" y="196" font-family="ui-monospace, monospace" font-size="12" fill="#44454B">nghìn tỷ NDT (2025)</text>
  <text x="320" y="214" font-family="ui-monospace, monospace" font-size="11" fill="#6C6D74">hai nguồn vênh nhau · dự báo 3,5 (2035)</text>

  <text x="560" y="172" font-family="Georgia, serif" font-size="34" fill="#9B6B1C">≠</text>

  <!-- World -->
  <text x="600" y="128" font-family="ui-monospace, monospace" font-size="11" letter-spacing="1.2" fill="#9B6B1C">THẾ GIỚI</text>
  <text x="600" y="172" font-family="Georgia, serif" font-size="40" font-weight="600" fill="#1A1A1C">≈164</text>
  <text x="600" y="196" font-family="ui-monospace, monospace" font-size="12" fill="#44454B">tỷ USD drone (2030)</text>
  <text x="600" y="214" font-family="ui-monospace, monospace" font-size="11" fill="#6C6D74">dự báo · phạm vi ex-TQ</text>

  <line x1="40" y1="300" x2="720" y2="300" stroke="#E1DED7" stroke-width="1"/>
  <text x="40" y="328" font-family="Georgia, serif" font-size="14" fill="#44454B">Một con số đếm chuyến bay, một con số quy mô thị trường, một con số dự báo doanh thu.</text>
  <text x="40" y="350" font-family="Georgia, serif" font-size="14" fill="#44454B">Ba mẫu số khác nhau, nên đặt cạnh để so sánh chứ không cộng thành một tổng.</text>
  <text x="600" y="350" font-family="ui-monospace, monospace" font-size="10" letter-spacing="1" fill="#9C9D96" text-anchor="start">USR · ĐỒ-HOẠ GỐC</text>
</svg>
